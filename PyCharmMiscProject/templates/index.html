{% extends 'base.html' %}

{% block content %}

<div class="container">

<h1>CryptoVault Manager</h1>

<a href="/add" class="btn">
Tambah Pesan
</a>

<table>

<tr>
<th>ID</th>
<th>Algoritma</th>
<th>Signature</th>
<th>Aksi</th>
</tr>

{% for d in data %}

<tr>

<td>{{d.id}}</td>

<td>{{d.algorithm}}</td>

<td>{{d.signature[:20]}}</td>

<td>

<a href="/pdf/{{d.id}}">
PDF
</a>

<a href="/delete/{{d.id}}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}

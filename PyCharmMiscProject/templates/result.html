<!DOCTYPE html>
<html>

<head>

<title>Hasil Enkripsi</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1>HASIL ENKRIPSI</h1>

<table>

<tr>
<td>Original</td>
<td>{{ nama }}</td>
</tr>

<tr>
<td>Caesar</td>
<td>{{ caesar }}</td>
</tr>

<tr>
<td>Vigenere</td>
<td>{{ vigenere }}</td>
</tr>

<tr>
<td>SHA256</td>
<td>{{ sha256 }}</td>
</tr>

<tr>
<td>AES</td>
<td>{{ aes }}</td>
</tr>

</table>

<h3>QR CODE</h3>

<img
src="{{ url_for('static',
filename='qrcode/qr.png') }}"
width="200">

</div>

</body>
</html>

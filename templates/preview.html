{% extends 'base.html' %}

{% block content %}

<h1>Pratinjau Dokumen PDF</h1>

<table>

<tr>
<th>Judul Lagu</th>
<th>Penyanyi</th>
<th>Negara</th>
<th>Genre</th>
<th>Tahun</th>
</tr>

{% for s in songs %}
<tr>
<td>{{ s.judul }}</td>
<td>{{ s.penyanyi }}</td>

<td>{{ s.genre }}</td>

</tr>
{% endfor %}

</table>

{% endblock %}

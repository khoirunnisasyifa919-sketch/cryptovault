{% extends 'base.html' %}

{% block content %}
<div class="card form-card">
    <div class="card-header">
        <div class="header-left">
            <h2>Ubah Data Lagu</h2>
            <p class="header-desc">
                Sunting informasi lagu yang telah tersimpan dalam koleksi musik.
            </p>
        </div>
    
        <a href="{{ url_for('index') }}" class="btn btn-outline">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </a>
    
    </div>
    
    <div class="card-body">
    
        <form action="{{ url_for('edit_song', song_id=song.id) }}"
              method="POST"
              class="modern-form">
    
            <div class="form-group">
                <label for="judul_lagu">
                    <i class="fa-solid fa-music"></i>
                    Judul Lagu
                </label>
    
                <input
                    type="text"
                    id="judul_lagu"
                    name="judul_lagu"
                    value="{{ song.judul_lagu }}"
                    required
                    placeholder="Masukkan judul lagu..."
                    autocomplete="off">
            </div>
    
            <div class="form-group">
                <label for="penyanyi">
                    <i class="fa-solid fa-microphone"></i>
                    Penyanyi
                </label>
    
                <input
                    type="text"
                    id="penyanyi"
                    name="penyanyi"
                    value="{{ song.penyanyi }}"
                    required
                    placeholder="Masukkan nama penyanyi..."
                    autocomplete="off">
            </div>
    
            <div class="form-group">
                <label for="negara">
                    <i class="fa-solid fa-globe"></i>
                    Negara Asal
                </label>
    
                <input
                    type="text"
                    id="negara"
                    name="negara"
                    value="{{ song.negara }}"
                    required
                    placeholder="Masukkan negara asal lagu..."
                    autocomplete="off">
            </div>
    
            <div class="form-group">
                <label for="genre">
                    <i class="fa-solid fa-headphones"></i>
                    Genre Musik
                </label>
    
                <input
                    type="text"
                    id="genre"
                    name="genre"
                    value="{{ song.genre }}"
                    required
                    placeholder="Contoh: Pop, Rock, Jazz, Dangdut..."
                    autocomplete="off">
            </div>
    
            <div class="form-group">
                <label for="tahun">
                    <i class="fa-solid fa-calendar"></i>
                    Tahun Rilis
                </label>
    
                <input
                    type="number"
                    id="tahun"
                    name="tahun"
                    value="{{ song.tahun }}"
                    required
                    min="1900"
                    max="2100">
            </div>
    
            <div class="form-actions">
    
                <a href="{{ url_for('index') }}"
                   class="btn btn-outline">
                    Batal
                </a>
    
                <button type="submit"
                        class="btn btn-primary">
    
                    <i class="fa-solid fa-check"></i>
                    Perbarui Lagu
    
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

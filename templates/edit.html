<!DOCTYPE html>
<html>
<head>
<title>Edit Buku</title>
</head>

<body>

<h2>Edit Buku</h2>

<form method="POST">

<input
type="text"
name="judul"
value="{{ buku.judul }}"
required>

<br><br>

<input
type="text"
name="penulis"
value="{{ buku.penulis }}"
required>

<br><br>

<input
type="text"
name="penerbit"
value="{{ buku.penerbit }}"
required>

<br><br>

<button type="submit">
Perbarui Buku
</button>

</form>

</body>
</html>

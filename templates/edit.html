{% extends 'base.html' %}

{% block content %}

<div class="form-box">

<h2>Edit Data Lagu</h2>

<form method="POST">

<input name="judul"
value="{{ song.judul }}">

<input name="penyanyi"
value="{{ song.penyanyi }}">

<input name="negara"
value="{{ song.negara }}">

<input name="genre"
value="{{ song.genre }}">

<input name="tahun"
value="{{ song.tahun }}">

<button>Update Music</button>

</form>

</div>

{% endblock %}

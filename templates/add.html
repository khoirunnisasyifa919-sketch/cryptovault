{% extends 'base.html' %}

{% block content %}
<div class="card form-card">
    <div class="card-header">
        <div class="header-left">
            <h2>Tambah Lagu Baru</h2>
            <p class="header-desc">Tambahkan data lagu baru ke dalam database.</p>
        </div>
        <a href="{{ url_for('index') }}" class="btn btn-outline">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </a>
    </div>
    
    <div class="card-body">
        <form action="{{ url_for('add_book') }}" method="POST" class="modern-form">
            <div class="form-group">
                <label for="judul lagu"><i class="fa-solid fa-book"></i> Judul Lagu</label>
                <input type="text" id="judul lagu" name="judul lagu" required placeholder="Masukkan judul lengkap lagu..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="penyanyi"><i class="fa-solid fa-user-pen"></i> Penyanyi</label>
                <input type="text" id="penyanyi" name="penyanyi" required placeholder="Masukkan nama penyanyi..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="negara"><i class="fa-solid fa-building-columns"></i> Negara</label>
                <input type="text" id="negara" name="negara" required placeholder="Masukkan nama Negara..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="genre"><i class="fa-solid fa-building-columns"></i> Genre</label>
                <input type="text" id="genre" name="genre" required placeholder="Masukkan nama Genre..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="tahun"><i class="fa-solid fa-building-columns"></i> Tahun/label>
                <input type="number" id="tahun" name="tahun" required placeholder="Masukkan nama Tahun..." autocomplete="off">
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('index') }}" class="btn btn-outline">Batal</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Simpan Lagu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
